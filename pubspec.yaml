name: vesak_go
description: VesakGO Mobile App
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.0.0
  flutter_dotenv: ^5.1.0
  crypto: ^3.0.3
  shared_preferences: ^2.2.2
  geolocator: ^10.1.0
  http: ^1.1.0
  intl: ^0.18.1
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_launcher_icons: ^0.13.1
  image_picker: ^1.2.2
  share_plus: ^7.2.1
  table_calendar: ^3.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/launcher_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/launcher_icon.png"